<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kalkulator Wyceny AI</title>
    <link rel="stylesheet" href="/widget.css" />
  </head>
  <body>
    <main class="widget">
      <header class="widget__header">
        <h1>Kalkulator Wyceny AI</h1>
        <p>Opisz zakres prac oraz powierzchnie/ilosci, a asystent przygotuje wstepna wycene.</p>
      </header>

      <section class="widget__status" id="status">
        <strong>Status:</strong> Oczekuje na pierwsza wiadomosc
      </section>

      <section class="widget__messages" id="messages"></section>

      <section class="widget__estimate" id="estimate"></section>

      <form id="chatForm" class="widget__form">
        <textarea
          id="messageInput"
          name="message"
          rows="3"
          placeholder="Np. Lazienka 6m2, skucie starych plytek, plytki 60x60..."
          required
        ></textarea>
        <div class="widget__actions">
          <button type="submit" id="sendBtn">Wyslij</button>
          <button type="button" id="confirmBtn" disabled>Potwierdz wycene</button>
        </div>
      </form>

      <section class="widget__crm" id="crmResult"></section>
    </main>

    <script type="module" src="/widget.js"></script>
  </body>
</html>
